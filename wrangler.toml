name = "music-proxy"
main = "worker.mjs"
compatibility_date = "2026-01-15"

# nodejs_compat habilita Buffer / streams / TextEncoder usados pelos libs
# WASM internamente. Sem isso o mpg123-decoder explode no boot.
compatibility_flags = ["nodejs_compat"]

# Plano Workers Paid ($5/mês) é necessário: o transcode usa ~8-12 s de CPU
# por request, acima dos 10 ms do free tier.
# usage_model = "bundled"  # default no Paid; sem-CPU-limit

# R2 cache — DESABILITADO por enquanto. Sem cache cada request paga ~10s
# de CPU pra transcodar. Pra ativar:
#   1. Habilita R2 no dashboard: dash.cloudflare.com → R2 → Enable
#   2. Cria o bucket: npx wrangler r2 bucket create music-cache
#      (ou no painel: R2 → Create bucket → name: music-cache)
#   3. Descomenta o bloco abaixo
#   4. Redeploy
#
# [[r2_buckets]]
# binding = "MUSIC"
# bucket_name = "music-cache"

# Limites — sobe se vc tem músicas longas (preview Deezer é sempre 30 s,
# então 50 s de CPU é folgado).
# [limits]
# cpu_ms = 50000
