name = "music-cache"
main = "worker.mjs"
compatibility_date = "2026-01-15"

# Workers Free tier dá conta — só fazemos proxy + cache R2, sem decode.
# CPU gasto por request é ~1 ms (busca + headers), bem dentro dos 10 ms.

# R2 cache. Bucket precisa existir antes do deploy:
#   npx wrangler r2 bucket create music-cache
# ou painel: R2 → Create bucket → name: music-cache
[[r2_buckets]]
binding = "MUSIC"
bucket_name = "music-cache"
